<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #27ae60; color: white; padding: 20px; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border-radius: 0 0 5px 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Team Member Joined</h1>
        </div>
        <div class="content">
            <p>Hi {{ admin_name }},</p>
            <p><strong>{{ engineer_name }}</strong> ({{ engineer_email }}) has accepted your invitation and joined <strong>{{ tenant_name }}</strong> as a <strong>{{ role }}</strong>.</p>
            
            <p>They can now access {{ tenant_name }} and start collaborating with your team.</p>
            
            <p>Best regards,<br>The NeuralOps Team</p>
        </div>
    </div>
</body>
</html>
