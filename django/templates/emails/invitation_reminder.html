<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #f39c12; color: white; padding: 20px; border-radius: 5px 5px 0 0; }
        .content { background-color: #f9f9f9; padding: 20px; border-radius: 0 0 5px 5px; }
        .button { display: inline-block; padding: 12px 24px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reminder: Join {{ tenant_name }}</h1>
        </div>
        <div class="content">
            <p>Hi {{ engineer_email }},</p>
            <p>This is a friendly reminder that you have a pending invitation to join <strong>{{ tenant_name }}</strong> on NeuralOps.</p>
            
            <a href="{{ join_link }}" class="button">Join {{ tenant_name }}</a>
            
            <p>This invitation will expire in <strong>{{ expiry_days }} days</strong>.</p>
            
            <p>Best regards,<br>The NeuralOps Team</p>
        </div>
    </div>
</body>
</html>
