# ============================================================
# NeuralOps — Production Docker Compose
# Services: PostgreSQL (x2), Redis, Django/Gunicorn, FastAPI/Uvicorn,
#           Kong API Gateway, Kafka, Debezium, Elasticsearch,
#           Celery Worker (Django), Celery Beat (Django),
#           Celery Worker (FastAPI) ← Phase 3 addition, MinIO
# ============================================================

services:

  # ── DB-1 (Django Database) ───────────────────────────────────────────────────
  django_db:
    image: pgvector/pgvector:pg16
    container_name: db-django
    restart: unless-stopped
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    env_file: .env.docker
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-django_db}
      POSTGRES_USER: ${DJANGO_DB_USER:-neuralops}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-neuralops_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DJANGO_DB_USER:-neuralops} -d ${DJANGO_DB_NAME:-django_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── DB-2 (FastAPI Database) ──────────────────────────────────────────────────
  fastapi_db:
    image: pgvector/pgvector:pg16
    container_name: db-fastapi
    restart: unless-stopped
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    env_file: .env.docker
    environment:
      POSTGRES_DB: ${FASTAPI_DB_NAME:-neuralops_fastapi_db}
      POSTGRES_USER: ${FASTAPI_DB_USER:-neuralops_fastapi}
      POSTGRES_PASSWORD: ${FASTAPI_DB_PASSWORD:-fastapi_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - fastapi_postgres_data:/var/lib/postgresql/data
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FASTAPI_DB_USER:-neuralops_fastapi} -d ${FASTAPI_DB_NAME:-neuralops_fastapi_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Django / Gunicorn ────────────────────────────────────────────────────────
  django:
    build:
      context: ./django
      dockerfile: Dockerfile
      target: production
    container_name: django
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
      - app_logs:/app/logs
    networks:
      - neuralops_network
    depends_on:
      django_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Kong API Gateway (DB-less declarative mode) ─────────────────────────────
  kong:
    image: kong:3.7-ubuntu
    container_name: kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
      KONG_PROXY_LISTEN: "0.0.0.0:80"
      KONG_LOG_LEVEL: info
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_MEM_CACHE_SIZE: "32m"
      KONG_UNTRUSTED_LUA: "on"
      KONG_REDIS_HOST: redis
      KONG_REDIS_PORT: 6379
      KONG_NGINX_PROXY_REAL_IP_HEADER: X-Forwarded-For
      KONG_TRUSTED_IPS: 0.0.0.0/0,::/0
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    ports:
      - "80:80"
      - "127.0.0.1:8444:8444"
    networks:
      - neuralops_network
    depends_on:
      django:
        condition: service_healthy
      fastapi:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── FastAPI / Uvicorn ───────────────────────────────────────────────────────
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
      target: production
    container_name: fastapi
    restart: unless-stopped
    env_file: .env.docker
    environment:
      APP_ENV: production
      APP_NAME: neuralops-fastapi
      APP_VERSION: 1.0.0
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${FASTAPI_DB_USER:-neuralops_fastapi}:${FASTAPI_DB_PASSWORD:-fastapi_password}@fastapi_db:5432/${FASTAPI_DB_NAME:-neuralops_fastapi_db}
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ALGORITHM: RS256
      TENANT_SUSPENSION_REDIS_PREFIX: tenant
      TENANT_SUSPENSION_REDIS_SUFFIX: suspended
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    networks:
      - neuralops_network
    depends_on:
      fastapi_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Kafka ──────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    restart: unless-stopped
    env_file: .env.docker
    environment:
      CLUSTER_ID: "RdEoWBwUQyuyHQvv8SfHSA"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_CLUSTER_ID: "RdEoWBwUQyuyHQvv8SfHSA"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Debezium Connect ─────────────────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.7.0.Final
    container_name: debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      django_db:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-django-db1
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - neuralops_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Celery Worker — Django (Core Management tasks) ─────────────────────────
  # Broker: Redis db 0  |  Tasks: analytics, notifications, Stripe sync
  celery-worker:
    build:
      context: ./django
      dockerfile: Dockerfile
      target: worker
    container_name: celery-worker-django
    restart: unless-stopped
    env_file: .env.docker
    networks:
      - neuralops_network
    depends_on:
      django_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Celery Beat — Django (Periodic task scheduler) ─────────────────────────
  celery-beat:
    build:
      context: ./django
      dockerfile: Dockerfile
      target: worker
    container_name: celery-beat-django
    restart: unless-stopped
    env_file: .env.docker
    command: >
      celery -A config beat
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - neuralops_network
    depends_on:
      django_db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Django Kafka Consumer — Indexing Status Sync ─────────────────────────────
  # Listens to the ``indexing.status`` topic published by FastAPI's index_code
  # Celery task (via the DB-2 outbox → Debezium pipeline) and updates
  # GitHubIntegration.indexing_status in DB-1 so the frontend shows the real
  # status instead of permanently showing "Pending".
  #
  # Architecture reference: NeuralOps Technical Documentation — Section 3
  # (Service 1 — Django, Kafka consumption: incidents.created & indexing.status)
  django-kafka-consumer:
    build:
      context: ./django
      dockerfile: Dockerfile
      target: kafka-consumer
    container_name: django-kafka-consumer
    restart: unless-stopped
    env_file: .env.docker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    networks:
      - neuralops_network
    depends_on:
      django_db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── Celery Worker — FastAPI (AI + Background Tasks) ─────────────────────────
  # Broker: Redis db 2  |  Tasks: index_code, parse_log, run_agent (Phase 4+)
  #
  # Completely isolated from the Django Celery worker above:
  #   - Django workers: Redis db 0  (CELERY_BROKER_URL=redis://redis:6379/0)
  #   - FastAPI workers: Redis db 2 (CELERY_BROKER_URL=redis://redis:6379/2)
  #
  # This separation ensures:
  #   1. Queue depth metrics are accurate per-service.
  #   2. KEDA ScaledObjects can target the correct Redis key prefix.
  #   3. A stalled FastAPI task queue cannot block Django tasks or vice-versa.
  celery-worker-fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
      target: production
    container_name: celery-worker-fastapi
    restart: unless-stopped
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --concurrency=4
      --queues=celery,embed
    env_file: .env.docker
    environment:
      # Celery isolated to Redis db 2 — never conflicts with Django (db 0)
      CELERY_BROKER_URL: "redis://redis:6379/2"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      # FastAPI DB-2 connection for tasks that write to code_index / incidents
      DATABASE_URL: postgresql+asyncpg://${FASTAPI_DB_USER:-neuralops_fastapi}:${FASTAPI_DB_PASSWORD:-fastapi_password}@fastapi_db:5432/${FASTAPI_DB_NAME:-neuralops_fastapi_db}
      REDIS_URL: redis://redis:6379/1
      APP_ENV: production
      APP_NAME: neuralops-fastapi-worker
      APP_VERSION: 1.0.0
      DEBUG: "false"
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ALGORITHM: RS256
      TENANT_SUSPENSION_REDIS_PREFIX: tenant
      TENANT_SUSPENSION_REDIS_SUFFIX: suspended
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      # Hot-reload volume for local development — source changes reflect
      # immediately without requiring an image rebuild.
      - ./fastapi:/app
    networks:
      - neuralops_network
    depends_on:
      redis:
        condition: service_healthy
      fastapi_db:
        condition: service_healthy

  # ── MinIO (Local S3 Mock Object Storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    networks:
      - neuralops_network
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

# ── Named Volumes ────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  fastapi_postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  app_logs:
    driver: local
  kafka_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local

# ── Internal Network ─────────────────────────────────────────────────────────
networks:
  neuralops_network:
    driver: bridge
    name: neuralops_network