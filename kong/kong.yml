# ============================================================
# NeuralOps — Kong Declarative Configuration (DB-less mode)
# ============================================================
_format_version: "3.0"
_transform: true

# ── Upstreams ──────────────────────────────────────────────────────────────────
upstreams:
  - name: django-upstream
    targets:
      - target: django:8000
        weight: 100

  - name: fastapi-upstream
    targets:
      - target: fastapi:8001
        weight: 100

# ── Services ───────────────────────────────────────────────────────────────────
services:
  # ── Django Core Management Service ─────────────────────────────────────────
  - name: django-service
    host: django-upstream
    port: 80
    protocol: http
    connect_timeout: 60000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC: No JWT validation required at gateway (Django handles internally).

      - name: invitations-routes
        paths:
          - /api/v1/invitations
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC: Required for invitees accepting invites. Django secures private sub-paths.

      - name: tenant-routes
        paths:
          - /api/v1/tenant
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: admin-routes
        paths:
          - /api/admin
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: alerts-routes
        paths:
          - /api/v1/alerts
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: playbooks-routes
        paths:
          - /api/v1/playbooks
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: integrations-routes
        paths:
          - /api/v1/integrations
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: schema-routes
        paths:
          - /api/v1/schema
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC: Django Spectacular API schema & Swagger/Redoc UI.

      - name: static-routes
        paths:
          - /static
        strip_path: false
        preserve_host: true
        protocols: [http, https]

      - name: media-routes
        paths:
          - /media
        strip_path: false
        preserve_host: true
        protocols: [http, https]

      - name: django-admin-panel
        paths:
          - /admin
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC/Session Auth (Django handles internally).

      - name: django-health-route
        paths:
          - /api/v1/health
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC: Required for direct platform or gateway-based health monitoring.

  # ── FastAPI AI + Real-time Service ─────────────────────────────────────────
  - name: fastapi-service
    host: fastapi-upstream
    port: 80
    protocol: http
    connect_timeout: 60000
    read_timeout: 120000
    write_timeout: 120000
    routes:
      - name: fastapi-protected-routes
        paths:
          - /api/v1/ingest
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: fastapi-public-webhooks
        paths:
          - /api/v1/webhooks
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        # PUBLIC: Required for unauthenticated GitHub webhooks. FastAPI verifies cryptographically.

      - name: websocket-routes
        paths:
          - /ws
        strip_path: false
        preserve_host: true
        protocols: [http, https]
        headers:
          Upgrade:
            - websocket
        plugins:
          - name: jwt
            config:
              claims_to_verify: [exp]
              key_claim_name: iss
          - name: request-transformer
            config:
              add:
                headers: ["X-Gateway-Validated: true"]

      - name: health-route
        paths:
          - /health
        strip_path: false
        preserve_host: true
        protocols: [http, https]

