# ── Global Plugins ─────────────────────────────────────────────────────────────
plugins:
  # ── Rate Limiting ─────────────────────────────────────────────────────────
  - name: rate-limiting
    config:
      minute: 3000
      policy: local
      hide_client_headers: false
      fault_tolerant: true

  # ── CORS (Cross-Origin Resource Sharing) ──────────────────────────────────
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Requested-With
        - X-Request-ID
        - X-Gateway-Validated
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  # ── JWT Claims Injection (Enhanced pre-function) ─────────────────────────────
  - name: pre-function
    config:
      access:
        - |
          local auth_header = kong.request.get_header("Authorization")
          if auth_header and string.sub(auth_header, 1, 7) == "Bearer " then
            local token = string.sub(auth_header, 8)
            local payload_b64 = token:match("^[^%.]+%.([^%.]+)%.[^%.]+$")
            if payload_b64 then
              local remainder = #payload_b64 % 4
              if remainder > 0 then
                payload_b64 = payload_b64 .. string.rep("=", 4 - remainder)
              end
              local payload_b64_url = payload_b64:gsub("-", "+"):gsub("_", "/")
              local decoded = ngx.decode_base64(payload_b64_url)
              if decoded then
                local cjson = require("cjson.safe")
                local payload = cjson.decode(decoded)
                if payload then
                  if payload.tenant_id then kong.service.request.set_header("x-tenant-id", payload.tenant_id) end
                  if payload.user_id then kong.service.request.set_header("x-user-id", payload.user_id) end
                  if payload.role then kong.service.request.set_header("x-user-role", payload.role) end
                  if payload.email then kong.service.request.set_header("x-user-email", payload.email) end
                  if payload.is_superadmin ~= nil then kong.service.request.set_header("x-is-superadmin", tostring(payload.is_superadmin)) end
                end
              end
            end
          end
