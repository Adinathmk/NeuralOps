# ============================================================
# NeuralOps — Development Override
# Overrides production settings for local development:
#   - Mounts source code for hot-reload (no rebuild needed)
#   - Exposes Django port 8000 and FastAPI port 8001 directly
#   - Sets DEBUG=True
#   - Uses console email backend (no real emails sent)
# ============================================================
# Usage:
#   docker compose up                 ← applies both files (prod+dev)
#   docker compose -f docker-compose.yml up  ← prod only
# ============================================================

services:

  django:
    build:
      target: production          # still build the same image

    # Development-only:
    # Run as root so container can write to Windows bind-mounted folders
    user: root

    volumes:
      - ./django:/app             # ← hot-reload: changes reflect immediately
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles

       # Local log persistence
      - ./django/logs:/app/logs
      
    ports:
      - "8000:8000"               # expose Django directly for debugging
    environment:
      DEBUG: "True"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      GUNICORN_WORKERS: "1"
      GUNICORN_LOG_LEVEL: "debug"

  celery-worker:
    user: root
    volumes:
      - ./django:/app             # ← same source as django, catches shim + code changes

  celery-beat:
    user: root
    volumes:
      - ./django:/app             # ← same source as django

  django-kafka-consumer:
    user: root
    volumes:
      - ./django:/app             # ← same source as django

  django_db:
    ports:
      - "5433:5432"               # expose Postgres for local tools (DBeaver, pgAdmin)

  fastapi:
    user: root                    # write to Windows bind-mounted folders
    volumes:
      - ./fastapi:/app            # ← hot-reload: changes reflect immediately
    ports:
      - "8001:8001"               # expose FastAPI directly for debugging
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8001
      --reload
      --log-level debug
    environment:
      DEBUG: "true"
      APP_ENV: development


  fastapi_db:
    ports:
      - "5434:5432"               # expose Postgres for local tools (DBeaver, pgAdmin)

  redis:
    ports:
      - "6379:6379"               # expose Redis for local tools (RedisInsight)
  
  kafka:
    ports:
      - "9092:9092"
  elasticsearch:
    ports:
      - "9200:9200"

  debezium:
    ports:
      - "8083:8083"

  # ── Ngrok (Webhook Testing) ───────────────────────────────────────────
  # NOTE: You must add NGROK_AUTHTOKEN=your_token to your .env.docker file!
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    command: http kong:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"               # expose ngrok inspector UI on host
    networks:
      - neuralops_network
    depends_on:
      - kong
