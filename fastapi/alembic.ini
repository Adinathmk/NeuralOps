[alembic]
# Path to migration scripts
script_location = alembic
prepend_sys_path = .

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# NOTE: sqlalchemy.url is set programmatically in alembic/env.py
# from the pydantic-settings Settings object. Do not set it here.

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
